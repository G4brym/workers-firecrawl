name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  changeset-check:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Check for changesets
        run: npx changeset status --since=origin/main
